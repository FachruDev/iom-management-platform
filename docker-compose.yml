services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT:-8082}:8082"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: "http://localhost:${APP_PORT:-8082}"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: "${DB_DATABASE:-iom_management}"
      DB_USERNAME: "${DB_DOCKER_USERNAME:-root}"
      DB_PASSWORD: "${DB_DOCKER_PASSWORD:-root_password}"
      IOM_STORAGE_DISK: local
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.4
    ports:
      - "${DB_FORWARD_PORT:-3307}:3306"
    environment:
      MYSQL_DATABASE: "${DB_DATABASE:-iom_management}"
      MYSQL_ROOT_PASSWORD: "${DB_DOCKER_PASSWORD:-root_password}"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_DOCKER_PASSWORD:-root_password}"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  mysql-data:

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT:-8082}:8082"
    environment:
      APP_NAME: "IOM Management System"
      APP_ENV: "${DOCKER_APP_ENV:-production}"
      APP_KEY: "${DOCKER_APP_KEY:-base64:zi1gWyWT92SV94lWTDfoFUYF5aa/ZJxKWALk72yUh20=}"
      APP_DEBUG: "${DOCKER_APP_DEBUG:-false}"
      APP_URL: "http://localhost:${APP_PORT:-8082}"
      LOG_CHANNEL: stack
      LOG_STACK: single
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: "${DOCKER_DB_DATABASE:-db_iom}"
      DB_USERNAME: "${DB_DOCKER_USERNAME:-root}"
      DB_PASSWORD: "${DB_DOCKER_PASSWORD:-root_password}"
      SESSION_DRIVER: file
      CACHE_STORE: file
      QUEUE_CONNECTION: database
      FILESYSTEM_DISK: local
      IOM_STORAGE_DISK: local
      RUN_DB_SEED: "${DOCKER_RUN_DB_SEED:-true}"
    volumes:
      - app-storage:/var/www/html/storage/app
      - app-logs:/var/www/html/storage/logs
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.4
    ports:
      - "${DB_FORWARD_PORT:-3307}:3306"
    environment:
      MYSQL_DATABASE: "${DOCKER_DB_DATABASE:-db_iom}"
      MYSQL_ROOT_PASSWORD: "${DB_DOCKER_PASSWORD:-root_password}"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_DOCKER_PASSWORD:-root_password}"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  mysql-data:
  app-storage:
  app-logs:
